worker_processes 1;

events {
  worker_connections 256;
}

http {
  # WebSocket upgrade map
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Basic settings
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 10M;

  # Gzip
  gzip on;
  gzip_types application/json text/plain application/xml;
  gzip_min_length 256;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

  # Upstream
  upstream rails {
    server web:3000;
  }

  # HTTP → HTTPS redirect
  server {
    listen 80;
    server_name api.nhaikanji.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Health check (cho Lightsail monitoring, không cần SSL)
    location /health {
      proxy_pass http://rails;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS
  server {
    listen 443 ssl;
    server_name api.nhaikanji.com;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Block PHP scanners / bots
    location ~* \.php$ {
      return 444;
    }

    # Block known scanner IPs (Azure bots)
    deny 20.104.124.39;
    deny 20.220.232.240;
    deny 20.151.2.242;
    deny 4.204.200.32;
    deny 68.221.129.30;
    deny 4.193.204.169;
    deny 104.209.148.10;
    deny 20.151.224.126;
    deny 172.190.142.176;
    deny 20.220.232.101;
    deny 104.46.216.98;
    deny 20.63.96.50;
    deny 20.220.144.87;
    deny 40.74.73.234;
    deny 20.5.72.178;
    deny 89.248.168.239;
    deny 20.151.109.1;
    deny 20.215.69.209;
    deny 85.211.194.91;
    deny 20.104.206.150;
    deny 222.89.169.98;
    deny 103.40.61.98;
    deny 101.47.158.137;
    deny 4.205.9.11;
    deny 202.155.143.143;
    deny 20.63.98.207;
    deny 170.64.158.19;
    deny 84.239.17.164;
    deny 84.239.16.169;
    deny 94.72.116.78;
    deny 89.185.81.112;
    deny 82.165.66.87;
    deny 50.149.203.166;
    deny 47.236.76.100;
    deny 43.162.110.113;
    deny 38.105.232.70;
    deny 34.66.133.48;
    deny 20.59.121.110;
    deny 194.163.146.95;
    deny 192.159.99.132;
    deny 190.124.153.17;
    deny 185.197.250.178;
    deny 181.176.14.90;
    deny 165.22.49.215;
    deny 165.154.227.162;
    deny 161.97.99.50;
    deny 143.110.248.64;
    deny 14.103.213.9;
    deny 130.61.28.82;
    deny 129.212.227.100;
    deny 118.70.178.158;
    deny 109.123.232.136;
    deny 103.143.10.79;
    deny 103.118.28.247;
    deny 101.36.118.177;
    deny 20.63.41.168;
    deny 165.245.168.176;
    deny 158.158.51.6;
    deny 8.220.192.64;
    deny 185.224.128.251;
    deny 172.235.194.184;
    deny 74.243.251.125;
    deny 66.179.138.32;
    deny 52.169.119.118;
    deny 51.107.69.151;
    deny 20.111.44.121;

    # ActionCable WebSocket
    location /cable {
      proxy_pass http://rails;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WS connections need long timeouts
      proxy_connect_timeout 7d;
      proxy_send_timeout 7d;
      proxy_read_timeout 7d;
    }

    # API routes
    location / {
      limit_req zone=api burst=20 nodelay;

      # Security headers
      add_header X-Frame-Options DENY always;
      add_header X-Content-Type-Options nosniff always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

      # CORS headers for all responses (including nginx errors like 503 rate limit)
      add_header 'Access-Control-Allow-Origin' $http_origin always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Device-ID' always;
      add_header 'Access-Control-Expose-Headers' 'Authorization' always;

      # Handle CORS preflight
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Device-ID' always;
        add_header 'Access-Control-Max-Age' 86400 always;
        return 204;
      }

      proxy_pass http://rails;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Timeouts
      proxy_connect_timeout 30s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }
  }
}
